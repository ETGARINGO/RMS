<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ASoG | PERSONNEL DATA SURVEY</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --ateneo-blue: #003A70; /* Official Ateneo Blue */
            --ateneo-light: #0072CE;
            --accent-gold: #D4AF37;
            --bg-white: #f4f7f9;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--ateneo-blue); 
            font-family: 'Montserrat', sans-serif;
        }

        /* --- BACKGROUND MAP (Geospatial Context) --- */
        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; 
            filter: grayscale(1) brightness(0.6) contrast(1.2);
        }

        /* --- INSTITUTIONAL HUD --- */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: linear-gradient(135deg, rgba(0, 58, 112, 0.95) 0%, rgba(0, 58, 112, 0.7) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s ease-in-out;
        }

        .header-main { text-align: center; color: white; }
        .header-main h1 { 
            margin: 0; font-size: 1.8rem; letter-spacing: 5px; font-weight: 700;
            text-transform: uppercase;
        }
        .header-main p {
            font-family: 'Share Tech Mono'; color: var(--accent-gold); 
            letter-spacing: 2px; margin-top: 10px;
        }

        /* --- SURVEY FRAME --- */
        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; transform: translateY(20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        #secure-frame.active {
            opacity: 1; transform: translateY(0); visibility: visible;
        }

        /* Tactical Labels */
        .asog-label {
            background: white !important;
            border: 2px solid var(--ateneo-blue) !important;
            color: var(--ateneo-blue) !important;
            font-weight: bold !important;
            font-size: 11px !important;
            border-radius: 4px;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent-gold);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-top: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="hud">
        <div class="header-main">
            <div style="font-size: 3rem; margin-bottom: 10px;">🏛️</div>
            <h1>Ateneo School of Government</h1>
            <p>PERSONNEL DATA SURVEY | SECURE ACCESS</p>
        </div>
        <div class="loader"></div>
    </div>

    <iframe id="secure-frame" 
            src="https://docs.google.com/spreadsheets/d/19iYWFrNh334DFyooj-lQNs5jHK3Llr79ASJ0P5U_jJE/edit?rm=minimal" 
            onload="startSystem()">
    </iframe>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Mapping ASoG Relevant Hubs (Quezon City Base)
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([14.639, 121.078], 14);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        const hubs = [
            { n: "ADMU CAMPUS", p: [14.639, 121.078] },
            { n: "PACD HUB", p: [14.635, 121.073] }
        ];

        hubs.forEach(h => {
            L.circleMarker(h.p, { radius: 6, color: '#003A70', fillColor: '#D4AF37', fillOpacity: 1 }).addTo(map)
             .bindTooltip(h.n, { permanent: true, direction: 'top', className: 'asog-label' });
        });

        function startSystem() {
            const frame = document.getElementById('secure-frame');
            const hud = document.getElementById('hud');

            // 1. Initial Map Zoom Out (The "Global View")
            setTimeout(() => {
                map.flyTo([14.639, 121.078], 15, { duration: 1.5 });
            }, 500);

            // 2. Smooth Transition to Survey
            setTimeout(() => {
                frame.classList.add('active');
                hud.style.opacity = "0";
                hud.style.transform = "scale(1.1)";
                
                setTimeout(() => { 
                    hud.style.display = 'none';
                }, 1000);
            }, 2500);
        }
    </script>
</body>
</html>

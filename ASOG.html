<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="Ateneo School of Government.png">
    <link rel="shortcut icon" type="image/png" href="Ateneo School of Government.png">
    <link rel="apple-touch-icon" href="Ateneo School of Government.png">
    
    <title>ASoG | PERSONNEL DATA SURVEY</title>
    
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <style>
        /* Define local variables for theme */
        :root {
            --ateneo-blue: #003A70;
            --ateneo-deep: #002D5A;
            --accent-gold: #D4AF37;
            --text-on-blue: #FFFFFF;
            --bg-ui: #f4f7f9;
        }

        /* Essential Reset - Speed optimization */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* System font stack for speed */
            background-color: var(--bg-ui);
            color: #333;
        }

        /* --- DASHBOARD LAYOUT (CSS Grid) --- */
        .portal-grid {
            display: grid;
            grid-template-rows: 60px 1fr 25px; /* Header, Body, Footer */
            height: 100vh;
            width: 100vw;
        }

        /* --- INSTANT HEADER --- */
        .portal-header {
            background-color: var(--ateneo-blue);
            color: var(--text-on-blue);
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
        }

        /* Modern, geometric SVG School Icon */
        .school-icon {
            height: 35px; width: 35px; fill: var(--accent-gold); margin-right: 15px;
        }

        .header-titles { display: flex; flex-direction: column; }
        .school-name {
            font-size: 1.1rem; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase;
        }
        .console-tag {
            font-size: 0.75rem; color: var(--accent-gold); font-weight: 400;
            letter-spacing: 2px; text-transform: uppercase; margin-top: -2px;
        }

        /* --- MAIN VIEWPORT (IFRAME) --- */
        .portal-body {
            position: relative;
            background-color: #fff;
        }

        /* Immediate embedding of your live Google Apps Script link */
        #survey-viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            /* Ensure the form loads with interactivity enabled right away */
        }

        /* --- MINIMALIST FOOTER --- */
        .portal-footer {
            background-color: var(--ateneo-deep);
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .secure-dot {
            height: 6px; width: 6px; background-color: var(--accent-gold);
            border-radius: 50%; margin-right: 6px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .school-name { font-size: 0.9rem; letter-spacing: 0px; }
            .console-tag { font-size: 0.6rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="portal-grid">
        
        <header class="portal-header">
            <svg class="school-icon" viewBox="0 0 100 100">
                <path d="M50,5 L15,20 L15,60 C15,80 50,95 50,95 C50,95 85,80 85,60 L85,20 L50,5 Z M70,55 L50,75 L30,55 L30,30 L70,30 L70,55 Z M50,40 C55,40 60,45 60,50 C60,55 55,60 50,60 C45,60 40,55 40,50 C40,45 45,40 50,40 Z"/>
            </svg>
            <div class="header-titles">
                <div class="school-name">Ateneo School of Government</div>
                <div class="console-tag">Personnel Data Survey Console</div>
            </div>
        </header>

        <main class="portal-body">
            <iframe id="survey-viewport" 
                    src="https://script.google.com/macros/s/AKfycbxGYzgfP14cv25jEoPs2YyCQNj1AMyohtwIG8E13GSwzmfscFcCawtgNMKUoiLQkksx/exec"
                    title="ASoG Personnel Survey Form">
            </iframe>
        </main>

        <footer class="portal-footer">
            <div class="secure-dot"></div>
            <span>Authorized Access Only | Secure Connection Verified</span>
        </footer>

    </div>

    <script>
        // Disable simple inspection shortcuts for 'clean' experience
        window.addEventListener('keydown', function (e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>

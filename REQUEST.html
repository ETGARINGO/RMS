<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" href="1 LOGO 3D (1).png">
    <link rel="apple-touch-icon" href="1 LOGO 3D (1).png">
    
    <title>Online Request Form | RPRMD Portal</title>
    
    <style>
        :root {
            --ateneo-blue: #003A70;
            --ateneo-deep: #002447;
            --accent-gold: #D4AF37;
            --bg-slate: #f1f5f9;
            /* Using dynamic viewport units for perfect fit */
            --header-h: 8vh; 
            --footer-h: 3vh;
            --min-header: 65px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            height: 100dvh; /* Supporting modern mobile heights */
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--ateneo-deep);
            color: #333;
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* --- PRELOADER --- */
        #loader {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, var(--ateneo-blue), var(--ateneo-deep));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- AUTO-FIT GRID LAYOUT --- */
        .portal-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            width: 100%;
        }

        /* --- HEADER (Desktop Look Optimized) --- */
        .portal-header {
            flex: 0 0 auto;
            min-height: var(--min-header);
            height: var(--header-h);
            background: linear-gradient(135deg, var(--ateneo-deep) 0%, var(--ateneo-blue) 100%);
            display: flex; align-items: center; padding: 0 2vw;
            border-bottom: 3px solid var(--accent-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .logo-group { display: flex; align-items: center; gap: 1.2vw; }

        .logo-frame {
            position: relative; 
            width: clamp(45px, 5vh, 65px); 
            height: clamp(45px, 5vh, 65px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }

        .brand-img {
            max-width: 80%; max-height: 80%;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .title-block { display: flex; flex-direction: column; }

        .main-title {
            font-size: clamp(1rem, 2.2vh, 1.6rem); 
            font-weight: 800; color: #fff;
            text-transform: uppercase; letter-spacing: 0.5px;
            line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .sub-tag {
            font-size: clamp(0.6rem, 1.1vh, 0.8rem); 
            color: var(--accent-gold);
            font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; margin-top: 4px;
            display: flex; align-items: center; gap: 10px;
        }

        /* --- FULL AUTO-FIT BODY --- */
        .portal-body {
            flex: 1 1 auto;
            background-color: var(--bg-slate);
            position: relative;
            overflow: hidden;
        }

        #survey-iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        /* --- FOOTER --- */
        .portal-footer {
            flex: 0 0 auto;
            height: var(--footer-h);
            min-height: 25px;
            background: #001a33;
            color: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(8px, 1vh, 11px);
        }

        .status-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 0 15px;
        }

        .pulse-dot {
            height: 6px; width: 6px;
            background-color: #10b981; border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Disable user text selection to keep it feeling like a desktop app */
        body { user-select: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Interactive Preloader -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="color: white; font-size: 11px; letter-spacing: 2px; margin-top: 20px; font-weight: 300;">ESTABLISHING SECURE CONNECTION</p>
    </div>

    <div class="portal-wrapper">
        
        <!-- Header optimized for scaling -->
        <header class="portal-header">
            <div class="logo-group">
                <div class="logo-frame">
                    <img src="1 LOGO 3D (1).png" alt="RPRMD Logo" class="brand-img">
                </div>
                <div class="title-block">
                    <span class="main-title">Online Request Form</span>
                    <span class="sub-tag">RPRMD | PERSONNEL DATA MANAGEMENT</span>
                </div>
            </div>
        </header>

        <!-- Body fits exactly between header and footer -->
        <main class="portal-body">
            <iframe id="survey-iframe" 
                    src="https://script.google.com/macros/s/AKfycby44_inieFokJsdR5rd0yE64VSIq8MGiHunj02PcagoMX5odH2ROqrTwzxxBBrdHr3Pqw/exec"
                    onload="dismissLoader()"
                    title="Personnel Survey Form"
                    allow="geolocation; microphone; camera">
            </iframe>
        </main>

        <!-- Footer -->
        <footer class="portal-footer">
            <div class="status-badge">
                <div class="pulse-dot"></div>
                <span>ENCRYPTED PORTAL • AUTHORIZED ACCESS ONLY</span>
            </div>
        </footer>

    </div>

    <script>
        // Dismiss loading screen when iframe is fully ready
        function dismissLoader() {
            const loader = document.getElementById('loader');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 600);
            }
        }

        // Emergency timeout (10s) 
        setTimeout(dismissLoader, 10000);

        // Security: Prevent typical "Right-Click" and "Inspect" behaviors
        window.addEventListener('keydown', function (e) {
            if (e.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || 
               (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });

        // Auto-fix height issues on mobile browsers with address bars
        function adjustHeight() {
            document.body.style.height = window.innerHeight + "px";
        }
        window.addEventListener('resize', adjustHeight);
        adjustHeight();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" href="1 LOGO 3D (1).png">
    <link rel="apple-touch-icon" href="1 LOGO 3D (1).png">
    
    <title>Online Request Form | RPRMD Portal</title>
    
    <style>
        :root {
            --ateneo-blue: #003A70;
            --ateneo-deep: #002447;
            --accent-gold: #D4AF37;
            --bg-slate: #f1f5f9;
            --header-h: 80px;
            --footer-h: 30px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--ateneo-deep);
            color: #333;
            overflow: hidden;
        }

        /* --- PRELOADER --- */
        #loader {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, var(--ateneo-blue), var(--ateneo-deep));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- LAYOUT --- */
        .portal-wrapper {
            display: grid;
            grid-template-rows: var(--header-h) 1fr var(--footer-h);
            height: 100vh;
            width: 100vw;
        }

        /* --- HEADER --- */
        .portal-header {
            background: linear-gradient(135deg, var(--ateneo-deep) 0%, var(--ateneo-blue) 100%);
            display: flex; align-items: center; padding: 0 25px;
            border-bottom: 3px solid var(--accent-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .logo-group { display: flex; align-items: center; gap: 18px; }

        .logo-frame {
            position: relative; width: 58px; height: 58px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .brand-img {
            max-width: 85%; max-height: 85%;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .logo-frame:hover .brand-img { transform: scale(1.1); }

        .title-block { display: flex; flex-direction: column; }

        .main-title {
            font-size: 1.4rem; font-weight: 800; color: #fff;
            text-transform: uppercase; letter-spacing: 0.5px;
            line-height: 1.1; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .sub-tag {
            font-size: 0.75rem; color: var(--accent-gold);
            font-weight: 600; letter-spacing: 2.5px;
            text-transform: uppercase; margin-top: 4px;
            display: flex; align-items: center; gap: 10px;
        }

        .sub-tag::after {
            content: ""; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
        }

        /* --- MAIN VIEWPORT --- */
        .portal-body {
            background-color: var(--bg-slate);
            position: relative;
        }

        #survey-iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        /* --- FOOTER --- */
        .portal-footer {
            background: #001a33;
            color: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; letter-spacing: 1px; font-weight: 500;
        }

        .status-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 2px 15px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .pulse-dot {
            height: 7px; width: 7px;
            background-color: #10b981; border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            :root { --header-h: 75px; }
            .main-title { font-size: 1.05rem; }
            .sub-tag { font-size: 0.6rem; letter-spacing: 1.5px; }
            .logo-frame { width: 48px; height: 48px; border-radius: 10px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Interactive Preloader -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="color: white; font-size: 11px; letter-spacing: 2px; margin-top: 20px; font-weight: 300;">ESTABLISHING SECURE CONNECTION</p>
    </div>

    <div class="portal-wrapper">
        
        <!-- Upgraded Header -->
        <header class="portal-header">
            <div class="logo-group">
                <div class="logo-frame">
                    <img src="1 LOGO 3D (1).png" alt="RPRMD Logo" class="brand-img">
                </div>
                <div class="title-block">
                    <span class="main-title">Online Request Form</span>
                    <span class="sub-tag">RPRMD | PERSONNEL DATA MANAGEMENT</span>
                </div>
            </div>
        </header>

        <!-- Main Form Frame -->
        <main class="portal-body">
            <iframe id="survey-iframe" 
                    src="https://script.google.com/macros/s/AKfycbzCowj5QHVG-P8KuOTZhQcEIceSmnyd_NJ5bPpXn9eW42pyn5A_GA57HDBsHut2aRx5lg/exec"
                    onload="dismissLoader()"
                    title="Personnel Survey Form">
            </iframe>
        </main>

        <!-- Secure Footer -->
        <footer class="portal-footer">
            <div class="status-badge">
                <div class="pulse-dot"></div>
                <span>ENCRYPTED PORTAL • AUTHORIZED ACCESS ONLY</span>
            </div>
        </footer>

    </div>

    <script>
        // Dismiss loading screen
        function dismissLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 600);
        }

        // Emergency timeout (12s) if script fails to load
        setTimeout(dismissLoader, 12000);

        // Security: Disable dev tool shortcuts
        window.addEventListener('keydown', function (e) {
            if (e.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || 
               (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>

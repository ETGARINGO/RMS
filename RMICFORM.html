<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="Video.gif">
    <link rel="apple-touch-icon" href="Video.gif">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO9 | RECORDS PROFILE REGISTRATION</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --defense-green: #00ff66;
            --bg-black: #020813;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            position: fixed; font-family: 'Segoe UI', -apple-system, sans-serif;
            user-select: none;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.25) contrast(1.4) saturate(0.4) hue-rotate(190deg);
            transition: opacity 1s ease;
        }

        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CONSOLE BUFFER OVERLAY */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(2, 8, 19, 0.80) 20%, rgba(2, 8, 19, 0.98) 100%);
            z-index: 99; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
            color: white; letter-spacing: 5px; font-size: 0.8rem; font-weight: 700;
            transition: opacity 0.5s ease;
        }

        .entrance-logo {
            width: 110px; height: auto;
            filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.55));
            margin-bottom: 25px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner {
            border: 3px solid rgba(255,255,255,0.03); border-top: 3px solid var(--tactical-blue);
            border-radius: 50%; width: 48px; height: 48px; animation: spin 0.75s linear infinite;
            margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
        }

        #load-text {
            text-transform: uppercase; text-align: center; line-height: 1.8;
            font-size: 0.75rem; color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        
        .sub-text {
            font-size: 0.6rem; color: var(--tactical-blue); letter-spacing: 3px; margin-top: 5px;
        }

        /* MAP VECTORS */
        .tactical-label {
            background: rgba(1, 10, 26, 0.92) !important;
            border: 1px solid var(--tactical-blue) !important;
            color: #fff !important;
            font-weight: 900 !important;
            font-family: 'Courier New', monospace !important;
            font-size: 10px !important;
            padding: 4px 10px !important;
            border-radius: 4px !important;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.35);
            text-transform: uppercase;
        }

        @keyframes nodePulse { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2.8); opacity: 0; } }
        .pulse-ring { border: 2px solid var(--defense-green); border-radius: 50%; animation: nodePulse 2s infinite; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>

    <div id="loading-overlay">
        <img src="pro9 logo.png" alt="PRO9 Logo" class="entrance-logo">
        <div class="spinner"></div>
        <div id="load-text">INITIALIZING SECURE REGISTRATION MATRIX...</div>
        <div class="sub-text">POLICE REGIONAL OFFICE 9</div>
    </div>

    <iframe id="secure-frame" 
            src="about:blank"
            allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;">
    </iframe>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // TARGET SCRIPT ENDPOINT - Directly triggers your core application infrastructure URL
        const REGISTRATION_ENDPOINT = "https://script.google.com/macros/s/AKfycbwZK55gC-uQSmoutnDgHCsu8rufxxxcLJUT5Mt-smaVl17FM3e3V32t9H8_3neIy0xtnw/exec?p=index";

        // Zamboanga Operational Coordinates
        const regionalJurisdictions = [
            { name: "SULU", coords: [6.0, 121.0] },
            { name: "ISABELA", coords: [6.7, 121.9] },
            { name: "ZAMBOANGA CITY", coords: [6.92, 122.07] },
            { name: "SIBUGAY", coords: [7.7, 122.5] },
            { name: "ZAMBOANGA SUR", coords: [7.8, 123.3] },
            { name: "ZAMBOANGA NORTE", coords: [8.2, 123.0] }
        ];

        // Satellite Grid Framework
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.92, 122.07], 9);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // Render tactical layout markers on map layer
        regionalJurisdictions.forEach(loc => {
            L.circleMarker(loc.coords, { radius: 5, color: '#fff', fillColor: '#00d4ff', fillOpacity: 1, weight: 2 }).addTo(map)
             .bindTooltip(loc.name, { permanent: true, direction: 'right', offset: [12, 0], className: 'tactical-label' });
            
            L.circleMarker(loc.coords, { radius: 15, color: '#00ff66', weight: 1, fillOpacity: 0, className: 'pulse-ring' }).addTo(map);
        });

        // Auto-run tactical loading routing sequence immediately on window initialize
        window.addEventListener('DOMContentLoaded', () => {
            const frameElement = document.getElementById('secure-frame');
            const overlayElement = document.getElementById('loading-overlay');
            const loadTextElement = document.getElementById('load-text');

            // Panoramic automated camera fly-to transition across the regional map space
            setTimeout(() => {
                map.flyTo([7.4, 122.3], 8, { duration: 1.2, easeLinearity: 0.2 });
                loadTextElement.innerHTML = "CONNECTING TO SECURE PROFILE DATABASE...<br><span style='color:var(--defense-green); font-size:11px;'>HANDSHAKE VERIFIED</span>";
            }, 400);

            // Establish secure connection to target Web App endpoint inside frame architecture
            frameElement.src = REGISTRATION_ENDPOINT;
            
            frameElement.onload = () => {
                overlayElement.style.opacity = "0";
                frameElement.style.visibility = "visible";
                frameElement.style.opacity = "1";
                
                // Securely clear background map layout and overlay nodes to maximize device hardware RAM performance
                setTimeout(() => { 
                    overlayElement.remove();
                    document.getElementById('map').remove();
                }, 600);
            };
        });

        // Hardened Perimeter Defense Metrics (Disables evaluation/inspection key combinations)
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
                return false;
            }
        };

        // Automatic Inactivity Session Reset Timer
        let sessionIdleTime = 0;
        const resetSessionClock = () => sessionIdleTime = 0;
        ['mousemove', 'keypress', 'touchstart'].forEach(signal => window.addEventListener(signal, resetSessionClock));

        setInterval(() => {
            sessionIdleTime++;
            if (sessionIdleTime >= 30) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

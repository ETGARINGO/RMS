<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="pro9 logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO9 | COMMAND</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --defense-green: #00ff66;
            --training-gold: #ffcc00;
            --bg-black: #000a12;
            --siren-red: #ff0033;
            --siren-blue: #0055ff;
            --glass: rgba(0, 10, 20, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Consolas', 'Courier New', monospace;
        }

        #bg-container {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-black) 100%),
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="52" viewBox="0 0 60 52"><path d="M30 0L60 17V45L30 52L0 45V17L30 0Z" fill="none" stroke="%2300d4ff" stroke-width="0.5" opacity="0.1"/></svg>');
            z-index: 0;
        }

        #map {
            position: absolute; inset: 0; z-index: 1;
            filter: brightness(0.3) contrast(1.2) saturate(0.2) hue-rotate(180deg);
            transition: filter 1s ease;
        }

        #hud {
            position: fixed; inset: 0; z-index: 20; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .header-branding {
            position: fixed; top: 30px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 25; transition: 0.5s;
        }

        .pnp-logo-main {
            width: 70px; height: auto;
            filter: drop-shadow(0 0 10px var(--tactical-blue));
            animation: pulse 2s infinite ease-in-out;
        }

        .terminal {
            position: absolute; bottom: 100px; left: 20px;
            color: var(--defense-green); font-size: 10px;
            background: var(--glass); padding: 12px;
            border-left: 3px solid var(--tactical-blue);
            min-width: 240px; z-index: 30;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        #secure-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 60px); 
            border: none; z-index: 120; opacity: 0; display: none;
            transform: scale(0.98);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        #secure-frame.active { display: block; opacity: 1; transform: scale(1); }

        /* SIREN FOOTER SYSTEM */
        .tactical-footer {
            position: fixed; bottom: 0; width: 100%; z-index: 130;
            background: rgba(0, 5, 10, 0.98);
            border-top: 2px solid var(--siren-blue);
            padding: 12px 0; text-align: center; color: white;
            backdrop-filter: blur(10px);
            animation: siren-border 1.2s infinite;
        }

        .motto {
            font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold;
            animation: siren-text 1.2s infinite;
        }

        @keyframes siren-border {
            0%, 100% { border-top-color: var(--siren-blue); box-shadow: 0 -5px 15px rgba(0, 85, 255, 0.3); }
            50% { border-top-color: var(--siren-red); box-shadow: 0 -5px 15px rgba(255, 0, 51, 0.3); }
        }

        @keyframes siren-text {
            0%, 100% { text-shadow: 0 0 8px var(--siren-blue); color: #fff; }
            50% { text-shadow: 0 0 12px var(--siren-red); color: #ffebeb; }
        }

        @keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-container"></div>
    <div id="map"></div>
    
    <div id="hud">
        <div class="header-branding" id="logoBox">
            <img src="pro9 logo.png" class="pnp-logo-main" alt="PNP PRO9">
            <div style="color: var(--tactical-blue); letter-spacing: 3px; font-size: 0.6rem; margin-top:8px; font-weight: bold;">PRO9 COMMAND PORTAL</div>
        </div>

        <div class="terminal" id="term">
            [SYS] BOOTING KERNEL...<br>
            [NET] SECURE UPLINK ACTIVE<br>
            [CMD] <span id="sync" style="color: var(--training-gold);">ROVING AOR...</span>
        </div>
    </div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbwQe5xpaGLp_3pZMFYhGuD98lVYpH_tGNvdkg2OHJ6x9t7_4VdW9t9g3yhWxJb_hABM/exec">
    </iframe>

    <footer class="tactical-footer">
        <span class="motto">“Bagong PNP para sa Bagong Pilipinas: Serbisyong Mabilis, Tapat, at Nararamdaman”</span><br>
        <span style="font-size: 8px; opacity: 0.5; letter-spacing: 1px;">OPRMD PRO9 | SECURE COMPETENCY PORTAL</span>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const sectors = [
            { n: "HQ PRO9", p: [6.92, 122.07] },
            { n: "ZAMBO SUR", p: [7.82, 123.43] }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false, dragging: false }).setView(sectors[0].p, 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        async function fastSequence() {
            const term = document.getElementById('term');
            const sync = document.getElementById('sync');
            const frame = document.getElementById('secure-frame');
            const hud = document.getElementById('hud');

            // 1. Instant Fast Sweep
            map.flyTo(sectors[1].p, 11, { animate: true, duration: 0.8 });
            term.innerHTML += `<br>[GEO] SCANNING SECTORS...`;
            
            await new Promise(r => setTimeout(r, 800));

            // 2. Lock & Deploy
            map.flyTo([7.5, 122.3], 8, { duration: 0.8 });
            sync.innerText = "UPLINK ESTABLISHED";
            sync.style.color = "var(--defense-green)";
            
            setTimeout(() => {
                frame.classList.add('active');
                hud.style.opacity = "0";
                map.style.filter = "brightness(0.1) grayscale(1) blur(2px)";
            }, 600);
        }

        // Trigger immediately when iframe begins to respond
        document.getElementById('secure-frame').onload = fastSequence;

        // Forced security
        document.onkeydown = (e) => { 
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; 
        };
    </script>
</body>
</html>

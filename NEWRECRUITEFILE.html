<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <link rel="icon" type="image/png" href="Video.gif">
    <link rel="apple-touch-icon" href="Video.gif">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PNP RECRUITMENT | 201 FILE PORTAL</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="PNP RECRUITMENT — 201 FILE PORTAL">
    <meta property="og:description" content="Secure Uplink Terminal — 201 File Documentary Requirements Sector.">
    <meta property="og:image" content="Video.gif"> 
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PNP RECRUITMENT — 201 FILE PORTAL">
    <meta name="twitter:description" content="Secure Uplink Terminal — 201 File Documentary Requirements Sector.">
    <meta name="twitter:image" content="Video.gif">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --defense-green: #00ff66;
            --elite-gold: #ffb700;
            --bg-black: #010b1a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            position: fixed; font-family: 'Segoe UI', sans-serif;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.35) contrast(1.6) saturate(0.5) hue-rotate(185deg);
        }

        /* TACTICAL HUD ARCHITECTURE */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle, transparent 25%, rgba(1, 11, 26, 0.95) 100%);
            transition: opacity 0.25s ease-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-main {
            text-align: center; color: white; text-transform: uppercase;
            margin-top: 25px;
        }
        
        .entrance-logo {
            width: 110px;
            height: auto;
            filter: drop-shadow(0 0 20px var(--tactical-blue));
            margin-bottom: 5px;
        }

        .header-main h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            letter-spacing: 4px; 
            font-weight: 900; 
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8); 
        }

        .header-subtitle {
            font-size: 0.7rem; 
            letter-spacing: 5px; 
            color: var(--tactical-blue); 
            margin-top: 8px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .document-tag {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--elite-gold);
            margin-top: 4px;
            font-weight: 800;
            font-family: monospace;
        }

        /* HIGH-VISIBILITY CRITICAL NODE LABELS */
        .tactical-label {
            background: rgba(1, 15, 35, 0.9) !important;
            border: 1px solid var(--tactical-blue) !important;
            color: #fff !important;
            font-weight: 900 !important;
            font-family: monospace !important;
            font-size: 11px !important;
            padding: 3px 10px !important;
            border-radius: 2px !important;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes nodePulse { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2.8); opacity: 0; } }
        .pulse-ring { border: 2px solid var(--defense-green); border-radius: 50%; animation: nodePulse 1.4s infinite ease-out; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease-in;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>

    <div id="hud">
        <img src="Video.gif" alt="PNP Portal Logo" class="entrance-logo">
        <div class="header-main">
            <h1>PNP RECRUITMENT — 201 FILE PORTAL</h1>
            <div class="header-subtitle">SECURE UPLINK TERMINAL</div>
            <div class="document-tag">[ STATUS: 201 FILE — DOCUMENTARY REQUIREMENTS SECTOR ]</div>
        </div>
        <div style="border: 3px solid rgba(0, 214, 255, 0.1); border-top: 3px solid var(--tactical-blue); border-radius: 50%; width: 38px; height: 38px; animation: spin 0.75s linear infinite; margin-top: 25px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);"></div>
    </div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbwfEM3xQHymZPtZcYiymh0IPnM6HZ2DNhqFfVw8YEfXDykrIfHip5vgQhMX6QykaBrH/exec" 
            allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;"
            onload="overdriveLaunch()">
    </iframe>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const jurisdictions = [
            { n: "SULU", p: [6.0, 121.0] },
            { n: "ISABELA", p: [6.7, 121.9] },
            { n: "ZAMBO CITY", p: [6.92, 122.07] },
            { n: "SIBUGAY", p: [7.7, 122.5] },
            { n: "ZAMBO SUR", p: [7.8, 123.3] },
            { n: "ZAMBO NORTE", p: [8.2, 123.0] }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.92, 122.07], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        jurisdictions.forEach(j => {
            L.circleMarker(j.p, { radius: 5, color: '#fff', fillColor: '#00d4ff', fillOpacity: 1, weight: 2 }).addTo(map)
             .bindTooltip(j.n, { permanent: true, direction: 'right', offset: [12, 0], className: 'tactical-label' });
            
            L.circleMarker(j.p, { radius: 16, color: '#00ff66', weight: 1, fillOpacity: 0, className: 'pulse-ring' }).addTo(map);
        });

        // Fast Display Logic 
        function overdriveLaunch() {
            const frame = document.getElementById('secure-frame');
            const hud = document.getElementById('hud');

            map.flyTo([7.4, 122.3], 8, { duration: 0.3, easeLinearity: 0.1 });

            setTimeout(() => {
                frame.style.visibility = "visible";
                frame.style.opacity = "1";
                hud.style.opacity = "0";
                setTimeout(() => { 
                    document.getElementById('map').remove();
                    hud.remove();
                }, 300);
            }, 250); 
        }

        // Security controls against inspection matrices
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
                return false;
            }
        };

        // Cache reset loops for idle terminals
        let idleTime = 0;
        const reset = () => idleTime = 0;
        ['mousemove', 'keypress', 'touchstart'].forEach(evt => window.addEventListener(evt, reset));

        setInterval(() => {
            idleTime++;
            if (idleTime >= 15) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

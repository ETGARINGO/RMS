<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="LOGO.png">
    <link rel="apple-touch-icon" href="LOGO.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personnel Data Entry System</title>
    
    <style>
        :root {
            --primary-blue: #1e40af;
            --accent-blue: #3b82f6;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --text-muted: #94a3b8;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-gradient-start); 
            position: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Sophisticated Executive Background Layer */
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
        }
        #bg-canvas::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* PREMIUM APP SPLASH / LOADING OVERLAY */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.8) 0%, rgba(15, 23, 42, 0.98) 100%);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container {
            position: relative;
            margin-bottom: 24px;
        }

        .entrance-logo {
            width: 90px;
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(59, 130, 246, 0.3));
        }

        .header-main {
            text-align: center; color: #ffffff;
            margin-top: 5px;
        }

        .header-main h1 { 
            margin: 0; font-size: 1.4rem; letter-spacing: 3px; font-weight: 700; 
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
        }

        .header-main p {
            font-size: 0.75rem; letter-spacing: 1.5px; color: var(--text-muted); 
            margin-top: 8px; font-weight: 500;
            text-transform: uppercase;
        }

        /* Modern Minimalist Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.08); 
            border-top: 3px solid var(--accent-blue); 
            border-radius: 50%; width: 36px; height: 36px; 
            animation: spin 0.8s linear infinite; margin-top: 32px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.6s ease-in-out;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-canvas"></div>

    <div id="splash-screen">
        <div class="logo-container">
            <img src="LOGO.png" alt="System Logo" class="entrance-logo">
        </div>
        <div class="header-main">
            <h1>Personnel Data Entry System</h1>
            <p>Secure Enterprise Portal • Establishing Connection</p>
        </div>
        <div class="spinner"></div>
    </div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbxVUxSyxca2dDgaQRk2vrFf95V8yAk-sH53_o1fc8sPRCcVEpFVOSXZwDQAqYpaiUuC/exec" 
            allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;"
            onload="initializeSystem()">
    </iframe>

    <script>
        // Smoothly unmasks the application frame once Web App data is completely buffered
        function initializeSystem() {
            const frame = document.getElementById('secure-frame');
            const splash = document.getElementById('splash-screen');

            setTimeout(() => {
                frame.style.visibility = "visible";
                frame.style.opacity = "1";
                splash.style.opacity = "0";
                
                setTimeout(() => { 
                    document.getElementById('bg-canvas').remove();
                    splash.remove();
                }, 600);
            }, 600);
        }

        // Security Protocol: Disables DevTools initialization shortcuts and Source visibility
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
                return false;
            }
        };

        // Automatic Session Guard: Performs soft refresh on 30 minutes of complete terminal idle
        let idleTime = 0;
        const resetTimer = () => idleTime = 0;
        ['mousemove', 'keypress', 'touchstart'].forEach(evt => window.addEventListener(evt, resetTimer));

        setInterval(() => {
            idleTime++;
            if (idleTime >= 30) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

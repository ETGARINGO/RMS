<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="LOGO.png">
    <link rel="apple-touch-icon" href="LOGO.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personnel Data Entry System</title>
    
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="preload" href="https://script.google.com/macros/s/AKfycbxVUxSyxca2dDgaQRk2vrFf95V8yAk-sH53_o1fc8sPRCcVEpFVOSXZwDQAqYpaiUuC/exec" as="document">

    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-blue: #3b82f6;
            --text-muted: #94a3b8;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-dark); 
            position: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Instant Render Canvas Background */
        #bg-canvas {
            position: absolute; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        /* High Performance Splash Overlay */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: rgba(15, 23, 42, 0.96);
            transition: opacity 0.3s ease-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            will-change: opacity;
        }

        .header-main { text-align: center; color: #ffffff; }
        .header-main h1 { 
            margin: 0; font-size: 1.3rem; letter-spacing: 2px; font-weight: 700; 
            text-transform: uppercase;
        }
        .header-main p {
            font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted); 
            margin: 6px 0 0 0; text-transform: uppercase;
        }

        /* Hardware Accelerated CSS Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.05); 
            border-top: 3px solid var(--accent-blue); 
            border-radius: 50%; width: 32px; height: 32px; 
            animation: spin 0.6s linear infinite; margin-top: 24px;
            will-change: transform;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease-in;
            will-change: opacity;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-canvas"></div>

    <div id="splash-screen">
        <div class="header-main">
            <h1>Personnel Data Entry System</h1>
            <p>Secure Portal • Connecting</p>
        </div>
        <div class="spinner"></div>
    </div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbxVUxSyxca2dDgaQRk2vrFf95V8yAk-sH53_o1fc8sPRCcVEpFVOSXZwDQAqYpaiUuC/exec" 
            allow="geolocation; camera; microphone; fullscreen; display-capture;"
            onload="initializeSystem()">
    </iframe>

    <script>
        // High-speed initialization and DOM clean-up
        function initializeSystem() {
            const frame = document.getElementById('secure-frame');
            const splash = document.getElementById('splash-screen');

            frame.style.visibility = "visible";
            frame.style.opacity = "1";
            splash.style.opacity = "0";
            
            setTimeout(() => { 
                document.getElementById('bg-canvas').remove();
                splash.remove();
            }, 350);
        }

        // Security Core
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
                return false;
            }
        };

        // Minimal Session Watcher
        let idleTime = 0;
        const resetTimer = () => idleTime = 0;
        ['mousemove', 'keypress', 'touchstart'].forEach(evt => window.addEventListener(evt, resetTimer, {passive: true}));

        setInterval(() => {
            idleTime++;
            if (idleTime >= 30) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO9 | UPDATED COMPETENCY TRAINING</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --defense-green: #00ff66;
            --training-gold: #ffcc00;
            --bg-black: #000a12;
            --siren-red: #ff0033;
            --siren-blue: #0055ff;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* TACTICAL HEX BACKGROUND */
        #bg-container {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-black) 100%),
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="52" viewBox="0 0 60 52"><path d="M30 0L60 17V45L30 52L0 45V17L30 0Z" fill="none" stroke="%2300d4ff" stroke-width="0.5" opacity="0.15"/></svg>');
            z-index: 0;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.4) contrast(1.4) saturate(0.3) hue-rotate(185deg);
            transition: filter 0.5s ease;
        }

        /* NAVIGATION CROSSHAIR */
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 50%; z-index: 15; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: var(--tactical-blue); opacity: 0.5;
        }
        #crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
        #crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; pointer-events: none;
            background: linear-gradient(rgba(0,10,20,0.4) 0%, transparent 50%, rgba(0,10,20,0.4) 100%);
        }

        /* SCANNING LINE */
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 15px var(--tactical-blue);
            top: 0; animation: scanMove 4s linear infinite;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        /* TACTICAL FOOTER */
        .tactical-footer {
            position: fixed; bottom: 0; width: 100%; z-index: 110;
            background: rgba(0, 5, 10, 0.9);
            border-top: 1px solid var(--tactical-blue);
            padding: 12px 0; text-align: center; color: white;
            backdrop-filter: blur(8px);
        }
        .motto {
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            font-weight: bold; animation: siren-glow 2s infinite;
        }
        @keyframes siren-glow {
            0%, 100% { color: var(--tactical-blue); text-shadow: 0 0 8px var(--siren-blue); }
            50% { color: #fff; text-shadow: 0 0 12px var(--siren-red); }
        }

        .terminal {
            position: absolute; bottom: 100px; left: 30px;
            color: var(--defense-green); font-family: 'Courier New', monospace; font-size: 11px;
            background: rgba(0,15,30,0.85); padding: 15px;
            border-left: 3px solid var(--training-gold);
            min-width: 250px; z-index: 30;
        }

        #secure-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 55px); 
            border: none; z-index: 100; opacity: 0; display: none;
            transition: opacity 1s ease;
        }

        .tactical-label {
            background: none !important; border: none !important;
            color: var(--tactical-blue) !important; font-weight: 900 !important;
            font-size: 11px !important; text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-container"></div>
    <div id="map"></div>
    <div id="crosshair"></div>

    <div id="hud">
        <div class="scan-line"></div>
        <div class="terminal" id="term">
            [NAV] INITIALIZING ROVER...<br>
            [AOR] REGION IX SECTORS<br>
            [CMD] <span id="sync" style="color: var(--training-gold);">AWAITING UPLINK...</span>
        </div>
    </div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbwQe5xpaGLp_3pZMFYhGuD98lVYpH_tGNvdkg2OHJ6x9t7_4VdW9t9g3yhWxJb_hABM/exec" 
            onload="startNavSweep()">
    </iframe>

    <footer class="tactical-footer">
        <span class="motto">“Bagong PNP para sa Bagong Pilipinas: Serbisyong Mabilis, Tapat, at Nararamdaman”</span><br>
        <span style="font-size: 8px; opacity: 0.5;">© 2025 DMAC Portal | OPRMD PRO9</span>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const sectors = [
            { n: "HQ PRO9", p: [6.92, 122.07] },
            { n: "ISABELA", p: [6.70, 121.97] },
            { n: "SULU UNIT", p: [6.00, 121.00] },
            { n: "ZAMBO SUR", p: [7.82, 123.43] },
            { n: "ZAMBO NORTE", p: [8.18, 123.00] },
            { n: "SIBUGAY", p: [7.73, 122.58] }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(sectors[0].p, 13);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        async function startNavSweep() {
            const term = document.getElementById('term');
            const sync = document.getElementById('sync');

            // 1. START ROVING NAVIGATION
            for (let i = 0; i < 3; i++) {
                let target = sectors[Math.floor(Math.random() * sectors.length)];
                term.innerHTML += `<br>[ROVE] SCANNING: ${target.n}`;
                map.panTo(target.p, { animate: true, duration: 0.8 });
                await new Promise(r => setTimeout(r, 1000));
            }

            // 2. FINAL AOR POSITIONING
            term.innerHTML += `<br>[NAV] LOCKING REGIONAL AOR...`;
            map.flyTo([7.5, 122.3], 8.5, { duration: 2 });

            setTimeout(() => {
                sectors.forEach(s => {
                    L.circleMarker(s.p, {
                        radius: 4, color: '#fff', fillColor: '#00d4ff', fillOpacity: 1, weight: 2
                    }).addTo(map).bindTooltip(s.n, {permanent: true, direction: 'right', className: 'tactical-label'});
                });
                
                sync.innerText = "UPLINK ESTABLISHED";
                sync.style.color = "var(--defense-green)";
            }, 1500);

            // 3. TRANSITION TO FORM
            setTimeout(() => {
                const frame = document.getElementById('secure-frame');
                frame.style.display = "block";
                setTimeout(() => { 
                    frame.style.opacity = "1";
                    document.getElementById('hud').style.opacity = "0";
                    document.getElementById('crosshair').style.opacity = "0";
                }, 100);
            }, 4500);
        }

        document.onkeydown = (e) => { if(e.keyCode == 123 || e.ctrlKey) return false; };
    </script>
</body>
</html>

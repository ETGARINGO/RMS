<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="Video.gif">
    <link rel="apple-touch-icon" href="Video.gif">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO9 | RECORDS MANAGEMENT PORTAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --defense-green: #00ff66;
            --alert-red: #ff3366;
            --bg-black: #010b1a;
            --glass-bg: rgba(1, 11, 26, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            position: fixed; font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.4) contrast(1.6) saturate(0.4) hue-rotate(185deg);
        }

        /* TACTICAL HUD */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(1, 11, 26, 0.9) 100%);
            transition: opacity 0.25s ease-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-main {
            text-align: center; color: white; text-transform: uppercase;
            margin-top: 20px;
        }
        
        .entrance-logo {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 15px var(--tactical-blue));
            margin-bottom: 10px;
        }

        .header-main h1 { margin: 0; font-size: 1.2rem; letter-spacing: 5px; font-weight: 900; text-shadow: 0 0 15px var(--tactical-blue); }

        /* HIGH VISIBILITY LABELS */
        .tactical-label {
            background: rgba(0, 20, 40, 0.85) !important;
            border: 1px solid var(--tactical-blue) !important;
            color: #fff !important;
            font-weight: 900 !important;
            font-family: monospace !important;
            font-size: 11px !important;
            padding: 2px 8px !important;
            border-radius: 3px !important;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
            text-transform: uppercase;
        }

        @keyframes nodePulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .pulse-ring { border: 2px solid var(--defense-green); border-radius: 50%; animation: nodePulse 1.2s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease-in;
        }

        /* FLOATING ACTION BUTTON (FORM) */
        .record-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(1, 11, 26, 0.9);
            border: 1px solid var(--tactical-blue);
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            user-select: none;
        }

        .record-fab:hover {
            transform: translateY(-3px) scale(1.03);
            border-color: var(--defense-green);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6), inset 0 0 15px rgba(0, 255, 102, 0.3);
            color: var(--defense-green);
        }

        .record-icon-dot {
            width: 10px;
            height: 10px;
            background-color: var(--tactical-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--tactical-blue);
            transition: background-color 0.3s ease;
        }

        .record-fab:hover .record-icon-dot {
            background-color: var(--defense-green);
            box-shadow: 0 0 8px var(--defense-green);
        }

        /* FORM MODAL CONTAINER */
        #record-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 5, 12, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #record-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-window {
            position: relative;
            width: 90%;
            height: 88%;
            max-width: 1400px;
            background: var(--bg-black);
            border: 1px solid var(--tactical-blue);
            border-radius: 12px;
            box-shadow: 0 0 35px rgba(0, 212, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        #record-modal-overlay.active .modal-window {
            transform: scale(1);
        }

        .modal-header {
            height: 45px;
            background: rgba(0, 20, 40, 0.95);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--alert-red);
            color: var(--alert-red);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: var(--alert-red);
            color: #fff;
            box-shadow: 0 0 10px var(--alert-red);
        }

        .modal-iframe-container {
            flex: 1;
            position: relative;
            width: 100%;
            background: #000;
        }

        .modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>

    <div id="hud">
        <img src="Video.gif" alt="PRO9 Logo" class="entrance-logo">
        <div class="header-main">
            <h1>POLICE REGIONAL OFFICE 9</h1>
            <p style="font-size: 0.65rem; letter-spacing: 3px; color: var(--tactical-blue); margin-top: 5px;">RECORDS MANAGEMENT PORTAL | SECURE UPLINK</p>
        </div>
        <div style="border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--tactical-blue); border-radius: 50%; width: 35px; height: 35px; animation: spin 0.8s linear infinite; margin-top: 20px;"></div>
    </div>

    <!-- MAIN IFRAME -->
    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbzl9KNeqte0uwlaAXuP2KeGdZOeyqIfyOlHM2tGAZpVS7jk7-Wr77efq5rdTWtEDiKFYg/exec?page=admin" 
            allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;"
            onload="overdriveLaunch()">
    </iframe>

    <!-- FLOATING FORM ACTION BUTTON -->
    <div class="record-fab" onclick="openRecordUI()">
        <span class="record-icon-dot"></span>
        <span>FORM</span>
    </div>

    <!-- FORM MODAL OVERLAY -->
    <div id="record-modal-overlay">
        <div class="modal-window">
            <div class="modal-header">
                <span>PRO9 // RECORD ENTRY TERMINAL</span>
                <button class="close-btn" onclick="closeRecordUI()">ESC [X]</button>
            </div>
            <div class="modal-iframe-container">
                <div id="modal-loader" class="modal-loader">
                    <div style="border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--tactical-blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
                    <span style="color: var(--tactical-blue); font-size: 0.75rem; letter-spacing: 2px; margin-top: 10px; font-family: monospace;">INITIALIZING RECORD MODULE...</span>
                </div>
                <iframe id="record-iframe" class="modal-iframe" allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;" onload="hideRecordLoader()"></iframe>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const RECORD_URL = "https://script.google.com/macros/s/AKfycbzl9KNeqte0uwlaAXuP2KeGdZOeyqIfyOlHM2tGAZpVS7jk7-Wr77efq5rdTWtEDiKFYg/exec";

        const jurisdictions = [
            { n: "SULU", p: [6.0, 121.0] },
            { n: "ISABELA", p: [6.7, 121.9] },
            { n: "ZAMBO CITY", p: [6.92, 122.07] },
            { n: "SIBUGAY", p: [7.7, 122.5] },
            { n: "ZAMBO SUR", p: [7.8, 123.3] },
            { n: "ZAMBO NORTE", p: [8.2, 123.0] }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.92, 122.07], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        jurisdictions.forEach(j => {
            L.circleMarker(j.p, { radius: 5, color: '#fff', fillColor: '#00d4ff', fillOpacity: 1, weight: 2 }).addTo(map)
             .bindTooltip(j.n, { permanent: true, direction: 'right', offset: [12, 0], className: 'tactical-label' });
            
            L.circleMarker(j.p, { radius: 15, color: '#00ff66', weight: 1, fillOpacity: 0, className: 'pulse-ring' }).addTo(map);
        });

        // Fast Display Logic 
        function overdriveLaunch() {
            const frame = document.getElementById('secure-frame');
            const hud = document.getElementById('hud');

            map.flyTo([7.4, 122.3], 8, { duration: 0.3, easeLinearity: 0.1 });

            setTimeout(() => {
                frame.style.visibility = "visible";
                frame.style.opacity = "1";
                hud.style.opacity = "0";
                setTimeout(() => { 
                    document.getElementById('map').remove();
                    hud.remove();
                }, 300);
            }, 250); 
        }

        // Floating FORM Logic
        function openRecordUI() {
            const modal = document.getElementById('record-modal-overlay');
            const iframe = document.getElementById('record-iframe');
            const loader = document.getElementById('modal-loader');

            if (!iframe.src || iframe.src === "about:blank") {
                loader.style.opacity = "1";
                loader.style.display = "flex";
                iframe.src = RECORD_URL;
            }

            modal.classList.add('active');
        }

        function closeRecordUI() {
            document.getElementById('record-modal-overlay').classList.remove('active');
        }

        function hideRecordLoader() {
            const loader = document.getElementById('modal-loader');
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 300);
        }

        // Key controls: ESC to close modal + developer console blocking
        document.onkeydown = function(e) {
            if (e.key === "Escape") {
                closeRecordUI();
            }
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
                return false;
            }
        };

        // Automatic fresh cache reload if terminal is left idle
        let idleTime = 0;
        const reset = () => idleTime = 0;
        ['mousemove', 'keypress', 'touchstart'].forEach(evt => window.addEventListener(evt, reset));

        setInterval(() => {
            idleTime++;
            if (idleTime >= 15) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="Video.gif">
    <link rel="apple-touch-icon" href="Video.gif">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO9 | RECORDS MANAGEMENT PORTAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --defense-green: #00ff66;
            --warning-amber: #ffb700;
            --bg-black: #010b1a;
            --panel-bg: rgba(1, 11, 26, 0.85);
            --border-glow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            position: fixed; font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.45) contrast(1.5) saturate(0.5) hue-rotate(185deg);
        }

        /* TOP STATUS BAR HUD */
        .hud-topbar {
            position: fixed; top: 15px; left: 20px; right: 20px;
            z-index: 20; pointer-events: none;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand-pill {
            pointer-events: auto;
            background: var(--panel-bg);
            border: 1px solid var(--tactical-blue);
            box-shadow: var(--border-glow);
            border-radius: 8px;
            padding: 8px 16px;
            display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(8px);
        }

        .brand-pill img { width: 32px; height: 32px; object-fit: contain; }
        .brand-pill .titles h1 { margin: 0; font-size: 0.85rem; letter-spacing: 2px; font-weight: 800; color: #fff; }
        .brand-pill .titles p { margin: 2px 0 0; font-size: 0.6rem; color: var(--tactical-blue); letter-spacing: 1px; }

        .system-status {
            pointer-events: auto;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.4);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.7rem; font-family: monospace;
            display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(8px);
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--defense-green); box-shadow: 0 0 8px var(--defense-green); }

        /* HIGH VISIBILITY MAP LABELS */
        .tactical-label {
            background: rgba(0, 20, 40, 0.9) !important;
            border: 1px solid var(--tactical-blue) !important;
            color: #fff !important;
            font-weight: 900 !important;
            font-family: monospace !important;
            font-size: 11px !important;
            padding: 3px 8px !important;
            border-radius: 4px !important;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            text-transform: uppercase;
        }

        @keyframes nodePulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .pulse-ring { border: 2px solid var(--defense-green); border-radius: 50%; animation: nodePulse 1.4s infinite; }

        /* FLOATING ACTION BUTTON (FAB) */
        .fab-container {
            position: fixed; bottom: 25px; right: 25px; z-index: 50;
            display: flex; align-items: center; gap: 12px;
        }

        .fab-label {
            background: var(--panel-bg); border: 1px solid var(--tactical-blue);
            color: var(--tactical-blue); font-size: 0.75rem; font-family: monospace;
            font-weight: 700; padding: 6px 12px; border-radius: 6px;
            letter-spacing: 1px; box-shadow: var(--border-glow);
            backdrop-filter: blur(8px); pointer-events: none;
            opacity: 0; transform: translateX(10px); transition: all 0.25s ease;
        }

        .fab-container:hover .fab-label { opacity: 1; transform: translateX(0); }

        .fab-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #004b75, #00d4ff);
            border: 2px solid #fff; color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            cursor: pointer; outline: none;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .fab-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.9);
        }

        .fab-btn svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* MODAL / IFRAME CONTAINER */
        #records-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: rgba(1, 11, 26, 0.85);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        #records-modal.active {
            opacity: 1; visibility: visible; pointer-events: auto;
        }

        .modal-header {
            height: 50px; background: rgba(0, 20, 40, 0.95);
            border-bottom: 1px solid var(--tactical-blue);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 0.85rem; font-family: monospace; font-weight: 700;
            color: var(--tactical-blue); letter-spacing: 2px;
            display: flex; align-items: center; gap: 8px;
        }

        .close-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; border-radius: 4px; padding: 4px 10px; cursor: pointer;
            font-size: 0.75rem; font-family: monospace; transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: rgba(255, 50, 50, 0.3); border-color: #ff3333; color: #ff3333;
        }

        .iframe-wrapper {
            flex: 1; position: relative; width: 100%; height: calc(100% - 50px);
        }

        #secure-frame {
            width: 100%; height: 100%; border: none;
        }

        /* LOADING OVERLAY INSIDE MODAL */
        .modal-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            transition: opacity 0.3s ease;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--tactical-blue);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 0.8s linear infinite; margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- LEAFLET MAP BACKGROUND -->
    <div id="map"></div>

    <!-- HUD OVERLAY HEADER -->
    <div class="hud-topbar">
        <div class="brand-pill">
            <img src="Video.gif" alt="PRO9 Logo" onerror="this.style.display='none'">
            <div class="titles">
                <h1>POLICE REGIONAL OFFICE 9</h1>
                <p>RECORDS MANAGEMENT PORTAL</p>
            </div>
        </div>
        <div class="system-status">
            <span class="status-dot"></span>
            <span>UPLINK: ACTIVE</span>
        </div>
    </div>

    <!-- FLOATING ACTION BUTTON (TRIGGER) -->
    <div class="fab-container">
        <span class="fab-label">OPEN RECORDS SYSTEM</span>
        <button class="fab-btn" onclick="openRecordsModal()" title="Open Records Terminal">
            <svg viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        </button>
    </div>

    <!-- OVERLAY MODAL CONTAINING IFRAME -->
    <div id="records-modal">
        <div class="modal-header">
            <div class="modal-title">
                <span style="color: var(--defense-green);">●</span> SECURE RECORDS MANAGEMENT TERMINAL
            </div>
            <button class="close-btn" onclick="closeRecordsModal()">[ ESC / CLOSE ]</button>
        </div>
        <div class="iframe-wrapper">
            <div id="modal-loader" class="modal-loader">
                <div class="spinner"></div>
                <div style="font-size: 0.75rem; font-family: monospace; letter-spacing: 2px; color: var(--tactical-blue);">
                    INITIALIZING SECURE SESSION...
                </div>
            </div>
            <iframe id="secure-frame" 
                    data-src="https://script.google.com/macros/s/AKfycbzl9KNeqte0uwlaAXuP2KeGdZOeyqIfyOlHM2tGAZpVS7jk7-Wr77efq5rdTWtEDiKFYg/exec" 
                    allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;"
                    onload="onIframeLoaded()">
            </iframe>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. MAP & JURISDICTION SETUP
        const jurisdictions = [
            { n: "SULU", p: [6.0, 121.0] },
            { n: "ISABELA", p: [6.7, 121.9] },
            { n: "ZAMBO CITY", p: [6.92, 122.07] },
            { n: "SIBUGAY", p: [7.7, 122.5] },
            { n: "ZAMBO SUR", p: [7.8, 123.3] },
            { n: "ZAMBO NORTE", p: [8.2, 123.0] }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([7.4, 122.3], 8);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        jurisdictions.forEach(j => {
            L.circleMarker(j.p, { radius: 5, color: '#fff', fillColor: '#00d4ff', fillOpacity: 1, weight: 2 }).addTo(map)
             .bindTooltip(j.n, { permanent: true, direction: 'right', offset: [12, 0], className: 'tactical-label' });
            
            L.circleMarker(j.p, { radius: 15, color: '#00ff66', weight: 1, fillOpacity: 0, className: 'pulse-ring' }).addTo(map);
        });

        // 2. MODAL & IFRAME CONTROLS
        const modal = document.getElementById('records-modal');
        const iframe = document.getElementById('secure-frame');
        const loader = document.getElementById('modal-loader');
        let frameLoaded = false;

        function openRecordsModal() {
            modal.classList.add('active');
            
            // Lazy load iframe source on first click for faster initial page render
            if (!iframe.src) {
                iframe.src = iframe.getAttribute('data-src');
            }
        }

        function closeRecordsModal() {
            modal.classList.remove('active');
        }

        function onIframeLoaded() {
            if (iframe.src) {
                frameLoaded = true;
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 300);
            }
        }

        // Close on ESC key press
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeRecordsModal();
            
            // Basic inspection blocking keybind check
            if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && ['U', 'S'].includes(e.key.toUpperCase()))
            ) {
                e.preventDefault();
            }
        });

        // 3. IDLE SESSION MONITORING (15 Mins Reset)
        let idleMinutes = 0;
        const resetTimer = () => { idleMinutes = 0; };
        ['mousemove', 'keydown', 'touchstart'].forEach(evt => window.addEventListener(evt, resetTimer, { passive: true }));

        setInterval(() => {
            idleMinutes++;
            if (idleMinutes >= 15) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="1 LOGO 3D (1).png">
    <link rel="apple-touch-icon" href="1 LOGO 3D (1).png">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <title>OPRMS ADMIN/ENCODER // PRO9</title>
    <style>
        :root {
            --pnp-blue: #000b1a;
            --pnp-gold: #d4af37;
            --interface-bg: #010409;
            --terminal-green: #00ff9d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            height: 100dvh; 
            width: 100vw; 
            background-color: var(--interface-bg);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0; 
            overflow: hidden; 
            position: fixed; 
        }

        /* --- LIGHTNING BOOT SCREEN --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 1, 1);
        }

        .scan-ring {
            position: absolute;
            width: 140px; height: 140px;
            border: 3px solid transparent;
            border-top: 3px solid var(--pnp-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* --- FULL SCREEN INTERFACE --- */
        .main-container {
            height: 100dvh;
            width: 100%;
            opacity: 0;
            transform: scale(1.02);
            transition: all 0.4s ease-out;
            display: flex;
            flex-direction: column;
            /* Handles modern mobile notches */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        body.ready .main-container { opacity: 1; transform: scale(1); }
        body.ready #boot-screen { opacity: 0; pointer-events: none; }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(1, 4, 9, 0.9);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .doc-label { font-size: 8px; color: var(--pnp-gold); letter-spacing: 2px; text-transform: uppercase; }
        .doc-title { font-weight: 900; font-size: 13px; letter-spacing: 0.5px; color: #fff; }

        .content-chassis {
            flex: 1;
            background: #fff;
            position: relative;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Tactical Corners for Frame */
        .corner { position: absolute; width: 12px; height: 12px; border: 2px solid var(--pnp-gold); z-index: 5; pointer-events: none; opacity: 0.7; }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .doc-title { font-size: 11px; }
            .top-nav { padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="scan-ring"></div>
        <div class="boot-content" style="text-align: center;">
            <img src="1 LOGO 3D (1).png" style="width: 90px;" alt="PNP">
            <div id="status" style="font-family: 'Share Tech Mono'; color: var(--pnp-gold); font-size: 9px; letter-spacing: 2px; margin-top: 12px;">
                INITIALIZING...
            </div>
        </div>
    </div>

    <div class="main-container">
        <header class="top-nav">
            <div>
                <div class="doc-label">PRO9 RPRMD</div>
                <div class="doc-title">OPRMS ADMIN/ENCODER //</div>
            </div>
            <div id="clock" style="font-family: 'Share Tech Mono'; font-size: 13px; color: var(--pnp-gold); font-weight: bold;">00:00:00</div>
        </header>

        <div class="content-chassis">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            
            <iframe 
                src="https://script.google.com/macros/s/AKfycbz_B4pMmgm2YtDkIkjMN8pyxyGaApRVfBDVRv8AmOLaaetf4k1QfBaTxxscudnmbo2Kvw/exec" 
                allow="geolocation; microphone; camera; clipboard-write"
                sandbox="allow-scripts allow-forms allow-same-origin allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        // Lightning Fast Boot Logic
        window.addEventListener('DOMContentLoaded', () => {
            const status = document.getElementById('status');
            const messages = ["AUTH...", "SYNC...", "READY"];
            let i = 0;

            const interval = setInterval(() => {
                if(i < messages.length) { 
                    status.innerText = messages[i++]; 
                } else { 
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.classList.add('ready');
                    }, 100);
                }
            }, 200);
        });

        // 24-Hour Digital Clock
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

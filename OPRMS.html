<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="1 LOGO 3D (1).png">
    <link rel="apple-touch-icon" href="1 LOGO 3D (1).png">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <title>OPRMS ADMIN/ENCODER // PRO9</title>
    <style>
        :root {
            --pnp-blue: #000b1a;
            --pnp-gold: #d4af37;
            --interface-bg: #010409;
            --terminal-green: #00ff9d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            height: 100dvh; 
            width: 100vw; 
            background-color: var(--interface-bg);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0; 
            overflow: hidden; 
            position: fixed; 
        }

        /* --- LIGHTNING BOOT SCREEN --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 1, 1); /* Faster fade out */
        }

        .scan-ring {
            position: absolute;
            width: 160px; height: 160px;
            border: 3px solid transparent;
            border-top: 3px solid var(--pnp-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite; /* Faster spin */
        }

        /* --- MAIN INTERFACE (NO SIDEBAR) --- */
        .main-container {
            height: 100dvh;
            width: 100%;
            opacity: 0;
            transform: scale(1.05); /* Slight zoom-in effect on entry */
            transition: all 0.4s ease-out;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        body.ready .main-container { opacity: 1; transform: scale(1); }
        body.ready #boot-screen { opacity: 0; pointer-events: none; }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 8px;
        }

        .doc-label { font-size: 8px; color: var(--pnp-gold); letter-spacing: 2px; }
        .doc-title { font-weight: 900; font-size: 14px; letter-spacing: 1px; color: #fff; }

        .content-chassis {
            flex: 1;
            background: #fff;
            border-radius: 4px;
            position: relative;
            border: 2px solid #1a1e26;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Corners */
        .corner { position: absolute; width: 10px; height: 10px; border: 2px solid var(--pnp-gold); z-index: 5; pointer-events: none; }
        .tl { top: 5px; left: 5px; border-right: 0; border-bottom: 0; }
        .tr { top: 5px; right: 5px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 5px; left: 5px; border-right: 0; border-top: 0; }
        .br { bottom: 5px; right: 5px; border-left: 0; border-top: 0; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .doc-title { font-size: 11px; }
            #clock { font-size: 11px !important; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="scan-ring"></div>
        <div class="boot-content" style="text-align: center;">
            <img src="1 LOGO 3D (1).png" style="width: 100px;" alt="PNP">
            <div id="status" style="font-family: 'Share Tech Mono'; color: var(--pnp-gold); font-size: 10px; letter-spacing: 2px; margin-top: 15px;">
                INIT...
            </div>
        </div>
    </div>

    <div class="main-container">
        <header class="top-nav">
            <div>
                <div class="doc-label">PRO9 RPRMD</div>
                <div class="doc-title">OPRMS PORTAL</div>
            </div>
            <div id="clock" style="font-family: 'Share Tech Mono'; font-size: 14px; color: var(--pnp-gold);">00:00:00</div>
        </header>

        <div class="content-chassis">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            
            <iframe 
                src="https://script.google.com/macros/s/AKfycbwl4dDn4TSWEOdi9y-llO38LWvG6Z9imA2HVZnva2yPxlua20BdD8XwxeK-2iSMii47nQ/exec" 
                allow="geolocation; microphone; camera; clipboard-write"
                sandbox="allow-scripts allow-forms allow-same-origin allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        // High-Speed Boot Sequence
        window.addEventListener('DOMContentLoaded', () => {
            const status = document.getElementById('status');
            const messages = ["AUTH...", "SYNC...", "READY"];
            let i = 0;

            const interval = setInterval(() => {
                if(i < messages.length) { 
                    status.innerText = messages[i++]; 
                } else { 
                    clearInterval(interval);
                    document.body.classList.add('ready');
                }
            }, 200); // 200ms per message for lightning feel
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour12: false});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Responsive Iframe</title>
    <style>
        /* Remove default margins and padding */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* Container for the iframe */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling for iOS */
        }

        /* Style the iframe to fill the container */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxOmg1-KQ5JvKVLhJSmOu2otcs-nVpbluHFjcrwFfTMQ7o0L--d3gAShUwHF-r3IOU_QQ/exec" 
            allow="geolocation; microphone; camera">
        </iframe>
    </div>

</body>
</html>

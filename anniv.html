<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PNP-PRO9 Anniversary Participation Form</title>
    <style>
        :root {
            /* Vintage Palette to match your form */
            --paper-bg: #f4e4bc;
            --ink-dark: #2c2c2c;
            --wax-red: #7a2a1e;
            --border-tan: #8d7d5d;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--paper-bg);
            /* Matching the subtle texture of the form */
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            font-family: 'Georgia', serif;
        }

        /* Vintage Loader Overlay */
        .loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.6s ease-in-out;
            background-color: var(--paper-bg);
        }

        /* Spinning Seal Effect */
        .seal-spinner {
            width: 60px;
            height: 60px;
            border: 2px double var(--border-tan);
            border-top: 3px solid var(--wax-red);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        .loading-text {
            color: var(--ink-dark);
            margin-top: 25px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: center;
            max-width: 80%;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Iframe Container Management */
        .iframe-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1;
            background: transparent;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0; /* Stay invisible until document is 'filed' */
            transition: opacity 0.8s ease-in;
        }

        /* Subtle "Aged" Vignette on the edges */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="loader-wrapper" id="loader">
        <div class="seal-spinner"></div>
        <div class="loading-text">Accessing Official Archives...<br><span style="font-size: 0.7rem; font-weight: normal; opacity: 0.7;">Please wait while the document loads.</span></div>
    </div>

    <div class="iframe-container">
        <iframe 
            id="appFrame"
            src="https://script.google.com/macros/s/AKfycbyFR41PjsoUzUS5r5oNV2fOaECGBKpF8Q0m_vwWwQn_X39cH38WZfWwsnyfAKecOlC2fg/exec" 
            allow="geolocation; microphone; camera; clipboard-write"
            onload="showApp()">
        </iframe>
    </div>

    <script>
        function showApp() {
            const frame = document.getElementById('appFrame');
            const loader = document.getElementById('loader');
            
            // 1. Reveal the Iframe
            frame.style.opacity = "1";
            
            // 2. Smoothly fade out the archival loader
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                }, 600);
            }, 300);
        }

        // Ensure the vintage look doesn't break on back-button navigation
        window.onpageshow = function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        };
    </script>
</body>
</html>

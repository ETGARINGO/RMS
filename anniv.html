<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 Anniversary Participation Portal</title>
    <style>
        :root {
            --bg-color: #0a1f44; /* Matches your form background */
            --accent: #4da3ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Loading Spinner */
        .loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            margin-top: 15px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Iframe Container */
        .iframe-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 2;
            background: transparent;
            /* Fixes iOS scroll lag */
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0; /* Hidden until loaded */
            transition: opacity 0.4s ease;
        }

        /* Error Message if Blocked */
        .error-msg {
            display: none;
            color: #ffbaba;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="loader-wrapper" id="loader">
        <div class="spinner"></div>
        <div class="loading-text">CONNECTING TO PRO9 SECURE PORTAL...</div>
    </div>

    <div class="iframe-container">
        <iframe 
            id="appFrame"
            src="https://script.google.com/macros/s/AKfycbyFR41PjsoUzUS5r5oNV2fOaECGBKpF8Q0m_vwWwQn_X39cH38WZfWwsnyfAKecOlC2fg/exec" 
            allow="geolocation; microphone; camera; clipboard-write"
            onload="showApp()">
        </iframe>
    </div>

    <script>
        function showApp() {
            const frame = document.getElementById('appFrame');
            const loader = document.getElementById('loader');
            
            // Fade in the app and remove the loader
            frame.style.opacity = "1";
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
            }, 500);
        }

        // Auto-refresh fix: Some mobile browsers cache iframes incorrectly.
        // This ensures the latest version of your script always loads.
        window.onpageshow = function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        };
    </script>
</body>
</html>

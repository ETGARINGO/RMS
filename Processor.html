<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="1 LOGO 3D (1).png">
    <link rel="apple-touch-icon" href="1 LOGO 3D (1).png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <title>PRO9 RPRMD | Admin Dashboard</title>
    <style>
        :root {
            --primary: #0f172a; /* Deep Slate Blue */
            --accent: #2563eb;  /* Professional Blue */
            --sidebar-bg: #1e293b;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sidebar-width: 260px;
            --header-height: 70px;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; 
            width: 100vw; 
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- MODERN LOADING SCREEN --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }

        /* --- DASHBOARD LAYOUT --- */
        .main-container {
            display: flex;
            height: 100dvh;
            width: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        body.ready .main-container { opacity: 1; }
        body.ready #boot-screen { opacity: 0; pointer-events: none; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header img { width: 40px; height: auto; }
        .sidebar-header span { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; }

        .nav-links {
            padding: 20px 12px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-item i { margin-right: 12px; font-size: 1.2rem; }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .sidebar-footer {
            padding: 20px;
            font-size: 0.75rem;
            color: #64748b;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* --- CONTENT AREA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Prevents flex items from overflowing */
        }

        .top-header {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .page-title h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
            color: var(--primary);
        }

        .page-title p {
            font-size: 0.8rem;
            margin: 2px 0 0 0;
            color: var(--text-muted);
        }

        /* --- IFRAME CONTAINER --- */
        .content-body {
            flex: 1;
            padding: 20px;
            background: var(--bg-light);
            overflow: hidden;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        #clock {
            font-weight: 600;
            color: var(--accent);
            background: #eff6ff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .top-header { padding: 0 15px; }
            .content-body { padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <img src="1 LOGO 3D (1).png" style="width: 80px;" alt="PNP Logo">
        <div class="loader"></div>
        <div id="status" style="color: var(--text-muted); font-size: 0.8rem; margin-top: 15px; font-weight: 500;">
            SECURE LOGIN INITIALIZING...
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="1 LOGO 3D (1).png" alt="Logo">
                <span>RPRMD-IX</span>
            </div>
            
            <nav class="nav-links">
                <a href="#" class="nav-item active">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="#" class="nav-item">
                    <i class="ph ph-file-text"></i> Birth Records
                </a>
                <a href="#" class="nav-item">
                    <i class="ph ph-user-gear"></i> Corrections
                </a>
                <a href="#" class="nav-item">
                    <i class="ph ph-chart-bar"></i> Analytics
                </a>
            </nav>

            <div class="sidebar-footer">
                Official RMD Portal v2.0<br>
                Zamboanga Peninsula
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h1>Correction of Entry</h1>
                    <p>Birth Record Management System</p>
                </div>
                
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div id="clock">00:00:00</div>
                    <div style="width: 35px; height: 35px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="ph ph-user" style="color: #64748b;"></i>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <div class="iframe-wrapper">
                    <iframe 
                        src="https://script.google.com/macros/s/AKfycbxVtTpv977fyX266Fk21-KY0Xy0ZJXZcVdqVAEfnPjJTFvBMjnX2NqS9GIO_DK790Tu/exec?page=admindashboard" 
                        allow="geolocation; microphone; camera">
                    </iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Smooth Loading Logic
        window.addEventListener('load', () => {
            const status = document.getElementById('status');
            const messages = ["ESTABLISHING SECURE CONNECTION...", "SYNCING DATABASE...", "ACCESS GRANTED"];
            let i = 0;
            
            const interval = setInterval(() => {
                if(i < messages.length) { 
                    status.innerText = messages[i++]; 
                } else { 
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.classList.add('ready');
                    }, 400);
                }
            }, 700);
        });

        // Professional Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

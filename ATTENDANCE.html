<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENDANCE FORM</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --phone-border: #1a1a1a;
            --header-color: #2c3e50;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Title and Logo Header */
        .header-section {
            text-align: center;
            margin-bottom: 15px;
        }

        .header-section h1 {
            color: var(--header-color);
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .logo {
            width: 80px; /* Adjust size of your 3D logo */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        /* Realistic Phone Mockup */
        .phone-mockup {
            width: 360px;
            height: 740px;
            background: #000;
            border: 12px solid var(--phone-border);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* The "Notch" or Camera hole */
        .phone-mockup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: var(--phone-border);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        /* The App Frame */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="1 LOGO 3D (1).png" alt="Company Logo" class="logo">
        <h1>Attendance Form</h1>
    </div>

    <div class="phone-mockup">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxz7HmMwElJfkPRSWo6PNb2tSnuHC6dRJX8SqiyBgrF_ATV7d8puaxl2l7oXQ7IaZ71/exec" 
            allow="geolocation; microphone; camera">
        </iframe>
    </div>

    <p class="footer-text">Optimized for Mobile Viewing</p>

</body>
</html>

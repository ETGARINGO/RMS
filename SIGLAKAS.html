<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGLAKAS | PRO9</title>
    <link rel="icon" type="image/png" href="SIGLAKAS.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --war-red: #ff0000;
            --tactical-bg: rgba(15, 0, 0, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #050505; color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* CRT SCANLINE & VIGNETTE OVERLAY */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, black 150%);
            z-index: 50; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 60; pointer-events: none;
        }

        /* FAST THUNDER LIGHTNING */
        @keyframes lightning {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 1; background: #fff; }
            97% { opacity: 0; }
            98% { opacity: 0.3; background: #4b4bdf; }
        }
        .storm-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 99;
            animation: lightning 5s infinite;
        }

        /* HUD ENTRANCE */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; 
            background: radial-gradient(circle, rgba(40,0,0,0.8) 0%, rgba(0,0,0,1) 100%);
            transition: all 0.5s ease-in-out;
            text-align: center;
        }

        .siglakas-logo {
            width: 220px;
            filter: drop-shadow(0 0 15px var(--war-red));
            animation: logoPulse 2s infinite alternate;
        }

        @keyframes logoPulse {
            from { transform: scale(1); filter: drop-shadow(0 0 15px var(--war-red)); }
            to { transform: scale(1.05); filter: drop-shadow(0 0 30px var(--war-red)); }
        }

        /* TACTICAL MAP */
        #map { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; 
            filter: sepia(1) hue-rotate(320deg) brightness(0.5) contrast(1.4) saturate(1.2); 
        }

        .tactical-label { 
            background: var(--tactical-bg) !important; 
            border: 1px solid var(--war-red) !important; 
            color: var(--war-red) !important; 
            font-size: 12px !important; 
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 8px var(--war-red);
        }
        
        /* DATA OVERLAY */
        #status-bar {
            position: fixed; bottom: 20px; left: 20px; 
            z-index: 70; color: var(--war-red);
            font-size: 11px; text-transform: uppercase;
            line-height: 1.5; text-shadow: 0 0 5px #f00;
        }

        /* BUTTON DESIGN */
        .launch-btn {
            margin-top: 40px; padding: 15px 50px; background: #600; color: #fff;
            border: 2px solid var(--war-red); cursor: pointer; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 0 15px var(--war-red); transition: 0.3s;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            letter-spacing: 3px;
        }
        .launch-btn:hover { background: var(--war-red); box-shadow: 0 0 40px var(--war-red); letter-spacing: 5px; }

        /* PULSE ANIMATION */
        .pulse-ring { animation: pulse 2s infinite ease-out; stroke: var(--war-red); }
        @keyframes pulse { from { r: 4; opacity: 1; } to { r: 25; opacity: 0; } }

        #secure-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; visibility: hidden; opacity: 0; transition: opacity 1.2s;
            z-index: 200; background: #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="storm-layer"></div>

    <div id="status-bar">
        SYSTEM: ARMED<br>
        SIGNAL: 128-BIT ENCRYPTED<br>
        LOC: <span id="live-coords">0.0000, 0.0000</span>
    </div>

    <div id="hud">
        <img src="SIGLAKAS.png" class="siglakas-logo" alt="SIGLAKAS">
        <button class="launch-btn" onclick="overdriveLaunch()">ACCESS FOLDER</button>
    </div>

    <div id="map"></div>

    <iframe 
        id="secure-frame" 
        src="https://script.google.com/macros/s/AKfycbyCOJsbQMHeQdCqdshQFneL0tl9PyhH3yTJVEB8LCGQNWjNed7ppsyldqNyiuEs9Kpn/exec"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups">
    </iframe>

    <script>
        // Initialize Map
        const jurisdictions = [
            { n: "SULU", p: [6.0, 121.0] },
            { n: "ISABELA", p: [6.7, 121.9] },
            { n: "ZAMBO CITY", p: [6.92, 122.07] },
            { n: "SIBUGAY", p: [7.7, 122.5] },
            { n: "ZAMBO SUR", p: [7.8, 123.3] },
            { n: "ZAMBO NORTE", p: [8.2, 123.0] }
        ];

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([7.5, 122.5], 8);
        
        // Tactical Satellite Layer
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        jurisdictions.forEach(j => {
            // Core Point
            L.circleMarker(j.p, { radius: 3, color: '#f00', fillColor: '#f00', fillOpacity: 1, weight: 2 }).addTo(map)
             .bindTooltip(j.n, { permanent: true, direction: 'top', offset: [0, -8], className: 'tactical-label' });
            
            // Radar Pulse
            L.circleMarker(j.p, { radius: 15, color: '#f00', weight: 1, fillOpacity: 0, className: 'pulse-ring' }).addTo(map);
        });

        // Live Coordinate Tracking
        map.on('mousemove', function(e) {
            document.getElementById('live-coords').innerHTML = 
                e.latlng.lat.toFixed(4) + ", " + e.latlng.lng.toFixed(4);
        });

        function overdriveLaunch() {
            const frame = document.getElementById('secure-frame');
            const hud = document.getElementById('hud');

            // 1. Glitch Effect
            hud.style.filter = "invert(1) contrast(10) blur(5px)";
            document.querySelector('.storm-layer').style.animation = "lightning 0.1s infinite";

            // 2. Tactical Zoom
            map.flyTo([6.92, 122.07], 13, { duration: 1.2, easeLinearity: 0.1 });

            setTimeout(() => {
                frame.style.visibility = "visible";
                frame.style.opacity = "1";
                hud.style.opacity = "0";
                
                setTimeout(() => { 
                    document.getElementById('map').remove();
                    document.getElementById('status-bar').remove();
                    hud.remove();
                }, 1000);
            }, 800);
        }

        // Standard Security Lockdown
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && [85, 83].includes(e.keyCode))) 
            return false;
        };

        // Auto-refresh on Idle (30 mins)
        let idleTime = 0;
        const reset = () => idleTime = 0;
        ['mousemove', 'keypress', 'touchstart'].forEach(evt => window.addEventListener(evt, reset));
        setInterval(() => {
            idleTime++;
            if (idleTime >= 30) window.location.reload();
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGLAKAS | RESTRICTED ACCESS</title>
    <link rel="icon" type="image/png" href="SIGLAKAS.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --war-red: #ff0000; --tactical-bg: rgba(10, 0, 0, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', monospace; }

        /* SECURITY OVERLAY */
        #security-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .auth-box {
            padding: 30px; border: 1px solid var(--war-red); background: var(--tactical-bg);
            text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        input[type="password"] {
            background: #111; border: 1px solid #444; color: var(--war-red);
            padding: 10px; margin-top: 15px; text-align: center; width: 200px; outline: none;
        }

        /* CRT EFFECTS */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; z-index: 60; pointer-events: none;
        }

        /* HUD & MAP */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; filter: brightness(0.4) contrast(1.5) sepia(1) hue-rotate(320deg); }
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; background: radial-gradient(circle, rgba(30,0,0,0.8) 0%, #000 100%);
            transition: 0.8s;
        }

        .tactical-label { background: #000 !important; border: 1px solid #f00 !important; color: #f00 !important; font-size: 10px !important; }

        .launch-btn {
            margin-top: 25px; padding: 15px 40px; background: #800; color: #fff;
            border: 2px solid #f00; cursor: pointer; font-weight: bold;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        #secure-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; visibility: hidden; z-index: 200; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="security-gate">
        <div class="auth-box">
            <img src="SIGLAKAS.png" width="80" style="filter: grayscale(1) invert(1);">
            <p style="color:#ff0000; font-size: 12px; letter-spacing: 2px;">SECURE TERMINAL PRO9</p>
            <input type="password" id="passkey" placeholder="ENTER ACCESS CODE" onkeypress="checkAuth(event)">
            <p id="err" style="color: yellow; font-size: 10px; margin-top: 10px; display: none;">INVALID CLEARANCE</p>
        </div>
    </div>

    <div class="scanlines"></div>

    <div id="hud">
        <img src="SIGLAKAS.png" width="180" style="filter: drop-shadow(0 0 15px #f00);">
        <h2 style="color: #f00; letter-spacing: 5px;">TACTICAL UPLINK</h2>
        <button class="launch-btn" onclick="overdriveLaunch()">AUTHORIZE CONNECTION</button>
    </div>

    <div id="map"></div>
    <iframe id="secure-frame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>

    <script>
        // 1. SIMPLE ENCRYPTION (Base64) to hide the Google Script URL from bots
        const _v = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J5Q09Kc2JRTS1IZVFkcWRzaFFGbmVMMHRsOVB5SDN5VEpWRUI4TENHUU5Xak5lZDdwcHN5bGRxTnlpdUVzOUtwbi9leGVj";
        
        // 2. AUTHENTICATION LOGIC (Replace 'PRO9-2024' with your desired code)
        function checkAuth(e) {
            if (e.key === 'Enter') {
                const code = document.getElementById('passkey').value;
                if (code === 'PRO9-2024') { 
                    document.getElementById('security-gate').style.display = 'none';
                    initMap();
                } else {
                    document.getElementById('err').style.display = 'block';
                    document.getElementById('passkey').value = '';
                }
            }
        }

        // 3. MAP INITIALIZATION (Only loads AFTER auth)
        function initMap() {
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([7.5, 122.5], 8);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            
            const locs = [[6.0, 121.0, "SULU"], [6.9, 122.0, "ZAMBO"]];
            locs.forEach(l => {
                L.circleMarker([l[0], l[1]], { radius: 5, color: '#f00' }).addTo(map)
                 .bindTooltip(l[2], { permanent: true, className: 'tactical-label' });
            });
        }

        // 4. TRANSITION TO SECURE IFRAME
        function overdriveLaunch() {
            const frame = document.getElementById('secure-frame');
            frame.src = atob(_v); // Decodes the URL only at the moment of launch
            frame.style.visibility = "visible";
            document.getElementById('hud').style.opacity = "0";
            setTimeout(() => { document.getElementById('hud').remove(); }, 800);
        }

        // 5. ANTI-TAMPER SECURITY LOCKDOWN
        document.onkeydown = function(e) {
            // Block F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                alert("UNAUTHORIZED ACCESS DETECTED");
                return false;
            }
        };

        // Detect if DevTools is opened
        setInterval(() => {
            const threshold = 160;
            if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                window.location.reload();
            }
        }, 1000);
    </script>
</body>
</html>

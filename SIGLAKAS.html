<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGLAKAS | PRO9</title>
    <link rel="icon" type="image/png" href="SIGLAKAS.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --war-red: #ff0000;
            --tactical-bg: rgba(15, 0, 0, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #050505; color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
        }

        .vignette, .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; pointer-events: none;
        }
        .vignette { background: radial-gradient(circle, transparent 30%, black 150%); }
        .scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 60;
        }

        @keyframes lightning {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 1; background: #fff; }
            98% { opacity: 0.3; background: #4b4bdf; }
        }
        .storm-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 99;
            animation: lightning 5s infinite;
        }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; 
            background: radial-gradient(circle, rgba(40,0,0,0.8) 0%, rgba(0,0,0,1) 100%);
            transition: 0.8s ease;
        }

        /* DIRECTORY MENU */
        #directory {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 600px; background: var(--tactical-bg);
            border: 2px solid var(--war-red); box-shadow: 0 0 30px var(--war-red);
            z-index: 200; display: none; padding: 30px;
        }

        .dir-item {
            display: block; padding: 15px; margin: 10px 0;
            border: 1px solid #400; color: #fff; text-decoration: none;
            background: rgba(50, 0, 0, 0.3); transition: 0.3s;
            text-transform: uppercase; font-weight: bold; font-size: 0.9rem;
        }
        .dir-item:hover { background: var(--war-red); color: #000; box-shadow: 0 0 15px var(--war-red); }

        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; filter: sepia(1) hue-rotate(320deg) brightness(0.4); }
        
        .launch-btn {
            margin-top: 40px; padding: 15px 50px; background: #600; color: #fff;
            border: 2px solid var(--war-red); cursor: pointer; font-weight: bold;
            box-shadow: 0 0 15px var(--war-red); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="storm-layer"></div>

    <div id="hud">
        <img src="SIGLAKAS.png" style="width:200px; filter: drop-shadow(0 0 15px #f00);" alt="SIGLAKAS">
        <button class="launch-btn" onclick="openDirectory()">DECRYPT DIRECTORY</button>
    </div>

    <div id="directory">
        <h2 style="color:var(--war-red); text-align:center; border-bottom: 1px solid #f00; padding-bottom: 10px;">TACTICAL ARCHIVES</h2>
        
        <a href="https://drive.google.com/drive/folders/1yM0T-YEKREz4ODmdwYYDh8WmGWeAtn57?usp=drive_link" target="_blank" class="dir-item">
            [2021 DEC 20] PERM REAPP (SIGLAKAS)
        </a>
        
        <a href="https://drive.google.com/drive/folders/1aMVu1dNhaRJZnGt5XALxIqVd1iDTmeub?usp=drive_link" target="_blank" class="dir-item">
            [2021 JUL 01] TEMP REAPP (SIGLAKAS)
        </a>
        
        <a href="https://drive.google.com/drive/folders/1-8iZ_JmbMpEZX7M5dQ4ISnyiDCYtXMTW?usp=drive_link" target="_blank" class="dir-item">
            [2020 JUL 01] TEMP ORIG (SIGLAKAS)
        </a>

        <button onclick="closeDirectory()" style="width:100%; background:transparent; color:#666; border:none; margin-top:20px; cursor:pointer;">[ CLOSE SESSION ]</button>
    </div>

    <div id="map"></div>

    <script>
        // Map Init
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([7.5, 122.5], 8);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function openDirectory() {
            document.getElementById('hud').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('hud').style.display = "none";
                document.getElementById('directory').style.display = "block";
            }, 800);
            map.flyTo([6.92, 122.07], 12);
        }

        function closeDirectory() {
            document.getElementById('directory').style.display = "none";
            document.getElementById('hud').style.display = "flex";
            setTimeout(() => { document.getElementById('hud').style.opacity = "1"; }, 10);
            map.flyTo([7.5, 122.5], 8);
        }

        // Security
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode))) return false;
        };
    </script>
</body>
</html>

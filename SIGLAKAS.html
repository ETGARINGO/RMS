<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="SIGLAKAS.png">
    <link rel="apple-touch-icon" href="SIGLAKAS.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIGLAKAS | PRO9 COMMAND</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --war-red: #ff0000;
            --tactical-blue: #00d4ff;
            --bg-black: #000814;
            --lightning-flash: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            position: fixed; font-family: 'Arial Black', sans-serif;
        }

        /* FAST THUNDER EFFECT */
        @keyframes strike {
            0%, 15%, 85%, 100% { background: transparent; opacity: 0; }
            7% { background: var(--lightning-flash); opacity: 1; }
            10% { background: transparent; }
            12% { background: var(--lightning-flash); opacity: 1; }
        }
        #lightning-bolt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; pointer-events: none; animation: strike 2.5s infinite;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.3) contrast(2) grayscale(1) invert(1);
        }

        /* TACTICAL HUD */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle, transparent 10%, rgba(0, 0, 0, 1) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease-in;
        }

        .entrance-logo {
            width: 150px; height: auto;
            filter: drop-shadow(0 0 20px var(--war-red));
            margin-bottom: 20px;
            animation: logoTremor 0.1s infinite alternate;
        }

        /* 3D WAR TYPOGRAPHY */
        .war-text {
            text-align: center; color: white; text-transform: uppercase;
            padding: 0 15px; max-width: 850px;
            text-shadow: 
                0 1px 0 #444, 0 2px 0 #333, 0 3px 0 #222, 
                0 4px 0 #111, 0 5px 10px rgba(255,0,0,0.5);
            animation: textFlicker 0.2s infinite alternate;
        }
        .war-text h1 { font-size: 1.4rem; margin: 0; letter-spacing: 1px; line-height: 1.2; }
        .war-text span { font-size: 2.2rem; color: var(--war-red); display: block; margin-top: 5px; }

        @keyframes logoTremor { from { transform: translate(1px, 1px); } to { transform: translate(-1px, -1px); } }
        @keyframes textFlicker { from { opacity: 1; } to { opacity: 0.8; } }

        /* NO-EXIT PERSISTENT IFRAME */
        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; visibility: hidden;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lightning-bolt"></div>
    <div id="map"></div>

    <div id="hud">
        <img src="SIGLAKAS.png" alt="SIGLAKAS Logo" class="entrance-logo">
        <div class="war-text">
            <h1>SINANAY SA ISIP AT GAWA LABAN SA KRIMINALIDAD</h1>
            <span>SIGLAKAS</span>
            <p style="font-size: 0.7rem; color: var(--tactical-blue); letter-spacing: 5px; margin-top: 15px; font-family: monospace;">STRIKE FORCE UPLINKING...</p>
        </div>
    </div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbyCOJsbQMHeQdCqdshQFneL0tl9PyhH3yTJVEB8LCGQNWjNed7ppsyldqNyiuEs9Kpn/exec" 
            allow="geolocation; camera; microphone; fullscreen; autoplay; display-capture;"
            onload="launchProtocol()">
    </iframe>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Setup Map for visual texture
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.92, 122.07], 10);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function launchProtocol() {
            const frame = document.getElementById('secure-frame');
            const hud = document.getElementById('hud');
            const bolt = document.getElementById('lightning-bolt');

            // Tactical Strike Zoom
            map.flyTo([6.92, 122.07], 14, { duration: 0.6, easeLinearity: 0.1 });

            setTimeout(() => {
                frame.style.visibility = "visible";
                frame.style.opacity = "1";
                hud.style.opacity = "0";
                
                // Absolute removal to lock user into the iframe DNS
                setTimeout(() => { 
                    hud.remove(); 
                    bolt.remove();
                    document.getElementById('map').remove(); 
                }, 500);
            }, 800);
        }

        // Security: Lock DevTools
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false;
        };
    </script>
</body>
</html>
